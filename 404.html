<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Seite nicht gefunden">
    <title>Maik Homeyer – Seite nicht gefunden</title>
    <link rel="icon" href="assets/favicon.svg" sizes="any" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <a href="index.html#main" class="skip-link">Zum Hauptinhalt springen</a>

    <header class="site-header"></header>

    <main id="main" tabindex="-1">
        <section class="not-found">
            <div class="container not-found__inner">
                <div class="not-found__display reveal" aria-label="404">
                    <span class="not-found__digit" aria-hidden="true">4</span>
                    <div class="not-found__circle-wrapper">
                        <svg viewBox="0 0 200 200" class="not-found__circle" aria-hidden="true">
                            <defs>
                                <path id="not-found-circle-path" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0" />
                            </defs>
                            <text>
                                <textPath href="#not-found-circle-path">
                                    Open for work · Open for work ·
                                </textPath>
                            </text>
                        </svg>
                    </div>
                    <span class="not-found__digit" aria-hidden="true">4</span>
                </div>
                <h1 class="not-found__title reveal" style="transition-delay: 0.16s">Ooops, Seite nicht gefunden.</h1>
                <p class="not-found__text reveal" style="transition-delay: 0.24s">Ich würde dir gerne mehr zeigen, aber hier ist wohl Schluss.</p>
                <a href="index.html" class="not-found__button reveal" style="transition-delay: 0.32s">Zurück zur Startseite</a>
            </div>
        </section>
    </main>

    <footer class="site-footer"></footer>
</body>
</html>
